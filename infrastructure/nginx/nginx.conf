events { worker_connections 1024; }

http {
  upstream fastapi  { server host.docker.internal:8001; }
  upstream django   { server host.docker.internal:8002; }
  upstream nextjs   { server host.docker.internal:3000; }

  server {
    listen 80;
    server_name localhost;

    location /api/v1/fhir     { proxy_pass http://fastapi; proxy_set_header Host $host; }
    location /api/v1/patients { proxy_pass http://fastapi; proxy_set_header Host $host; }
    location /api/v1/cases    { proxy_pass http://fastapi; proxy_set_header Host $host; }
    location /api/v1/search   { proxy_pass http://fastapi; proxy_set_header Host $host; }
    location /api/v1/registry { proxy_pass http://django;  proxy_set_header Host $host; }
    location /admin           { proxy_pass http://django;  proxy_set_header Host $host; }
    location /                { proxy_pass http://nextjs;  proxy_set_header Host $host; }
  }
}
