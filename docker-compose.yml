version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cr_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cancer_registry}
      POSTGRES_USER: ${POSTGRES_USER:-registry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-registry_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_replica:
    image: postgres:16-alpine
    container_name: cr_postgres_replica
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cancer_registry}
      POSTGRES_USER: ${POSTGRES_USER:-registry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: cr_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cr_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy

  hapi_fhir:
    image: hapiproject/hapi:v7.2.0
    container_name: cr_hapi_fhir
    ports:
      - "8090:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
    volumes:
      - hapi_data:/data/hapi

  metabase:
    image: metabase/metabase:latest
    container_name: cr_metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-registry_user}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  elasticsearch_data:
  keycloak_data:
  hapi_data:
  metabase_data:
